name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 請確認下面的網址名稱是否與你的 Hugging Face 一致
          git push --force https://WenzhenG107:$HF_TOKEN@huggingface.co/spaces/WenzhenG107/art-card-generator main

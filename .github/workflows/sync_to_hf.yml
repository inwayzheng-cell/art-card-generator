name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
- name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "你的信箱"
          git config --global user.name "inwayzheng-cell"
          # 關鍵：暫時停用 LFS 傳輸檢查
          git config --global lfs.allowincompleteobj true
          git remote add hf https://WenzhenG107:$HF_TOKEN@huggingface.co/spaces/WenzhenG107/art-card-generator
          # 推送時跳過預檢
          git push hf main --force
